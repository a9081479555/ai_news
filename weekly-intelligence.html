<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Intelligence｜AI Infrastructure Bankability</title><link rel="stylesheet" href="assets/news.css"></head><body>
<header class="bar"><div class="bar-inner"><div class="brand">AI INFRASTRUCTURE INTELLIGENCE</div><nav class="nav"><a href="index.html">研究平台</a><a href="daily-news.html">每日新聞</a><a class="active" href="weekly-intelligence.html">Weekly Intelligence</a></nav></div></header>
<main class="container"><section class="hero"><h1>Weekly Intelligence</h1><p>由已核准每日事件彙整；提供產業變化、公司事件、RM跟進清單與重大Evidence Gap。</p><div class="metrics"><div class="metric"><b id="weekCount">0</b><span>已發布週報</span></div><div class="metric"><b id="eventCount">0</b><span>本期事件</span></div><div class="metric"><b id="followCount">0</b><span>RM跟進項目</span></div><div class="metric"><b id="updatedAt">尚未更新</b><span>最後產生時間</span></div></div></section><section class="panel"><div class="controls"><select id="week"><option value="">最新一期</option></select><button id="csv">匯出本期事件 CSV</button></div><div id="weekly"><div class="empty">載入中…</div></div></section></main><footer class="footer">Weekly draft must be approved before publication｜非授信核准或投資建議。</footer>
<script src="assets/news.js"></script><script>
let weeks=[];const el=id=>document.getElementById(id);function current(){return weeks.find(x=>x.week_id===el('week').value)||weeks[0]}
function list(title,items){return `<div class="week-card"><h3>${esc(title)}</h3>${items?.length?`<ul>${items.map(x=>`<li>${esc(typeof x==='string'?x:(x.title||JSON.stringify(x)))}</li>`).join('')}</ul>`:'<div class="empty">本期無已核准項目</div>'}</div>`}
function render(){const w=current();if(!w){el('weekly').innerHTML='<div class="empty">目前尚無已核准週報。</div>';return}el('eventCount').textContent=(w.events||[]).length;el('followCount').textContent=(w.rm_followups||[]).length;el('weekly').innerHTML=`<h2>${esc(w.title||w.week_id)}</h2><p><span class="status">已核准公開</span> ${esc(w.period||'')}</p><div class="weekly-grid">${list('本週重要事件',w.highlights)}${list('六大系統與子產業變化',w.industry_changes)}${list('公司重大事件',w.company_events)}${list('CapEx／融資／跨境事件',w.banking_events)}${list('RM跟進清單',w.rm_followups)}${list('重大 Evidence Gap',w.evidence_gaps)}</div>`}
el('week').onchange=render;el('csv').onclick=()=>{const w=current();downloadCSV(`Weekly_${w?.week_id||'empty'}.csv`,[['日期','標題','公司','事件','來源','網址'],...(w?.events||[]).map(x=>[x.published_at,x.title,(x.companies||[]).join('／'),x.event_type,x.source_name,x.url])])};
(async()=>{const d=await loadJSON('data/public/weekly.json',{weeks:[]});weeks=d.weeks||[];el('weekCount').textContent=weeks.length;el('updatedAt').textContent=d.generated_at?fmt(d.generated_at):'尚未更新';el('week').insertAdjacentHTML('beforeend',weeks.map(w=>`<option value="${esc(w.week_id)}">${esc(w.title||w.week_id)}</option>`).join(''));render()})();
</script></body></html>
