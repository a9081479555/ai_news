<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Private Review Dashboard</title><link rel="stylesheet" href="assets/news.css"></head><body><header class="bar"><div class="bar-inner"><div class="brand">PRIVATE｜NEWS REVIEW QUEUE</div><nav class="nav"><a href="index.html">研究平台</a><a href="daily-news.html">公開新聞</a></nav></div></header><main class="container"><section class="hero"><h1>新聞待審核區</h1><p>本頁與 data/review 不得放入公開Pages部署成品。勾選核准事件後下載ID清單，再覆蓋 config/approved_news_ids.txt。</p></section><section class="panel"><div class="controls"><input id="q" type="search" placeholder="搜尋標題、公司、子產業…"><select id="status"><option value="">全部狀態</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select><button id="download">下載已核准ID</button></div><div id="summary"></div><div class="news-list" id="list"><div class="empty">載入中…</div></div></section><section class="panel"><h2>新台灣公司候選池</h2><div id="candidates"><div class="empty">尚無候選公司</div></div></section></main><script src="assets/news.js"></script><script>
let data={items:[],candidate_companies:[]},selected=new Set();const el=id=>document.getElementById(id);function rows(){const q=el('q').value.toLowerCase(),s=el('status').value;return data.items.filter(x=>(!q||JSON.stringify(x).toLowerCase().includes(q))&&(!s||x.status===s))}function render(){const r=rows();el('summary').innerHTML=`<p><span class="status">Queue ${data.items.length}</span>　可見 ${r.length}　已勾選 ${selected.size}</p>`;el('list').innerHTML=r.length?r.map(x=>`<article class="news-card ${x.importance==='High'?'high':''}"><label><input type="checkbox" data-id="${esc(x.id)}" ${selected.has(x.id)?'checked':''}> 核准發布</label><h3><a href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title)}</a></h3><div class="meta">${fmt(x.published_at)}｜${esc(x.source_name)}｜${esc(x.status)}</div><div class="tags">${(x.companies||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join('')}${(x.subindustries||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join('')}<span class="tag grade-c">Evidence ${esc(x.evidence_grade)}</span></div><p>${esc(x.summary)}</p><div class="gap">⚠ ${esc(x.evidence_gap)}</div></article>`).join(''):'<div class="empty">無符合條件項目</div>';document.querySelectorAll('[data-id]').forEach(c=>c.onchange=()=>{c.checked?selected.add(c.dataset.id):selected.delete(c.dataset.id);render()})}el('q').oninput=render;el('status').onchange=render;el('download').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['# Approved news IDs\n'+[...selected].join('\n')+'\n'],{type:'text/plain'}));a.download='approved_news_ids.txt';a.click();URL.revokeObjectURL(a.href)};(async()=>{data=await loadJSON('data/review/news_queue.json',data);el('candidates').innerHTML=data.candidate_companies?.length?data.candidate_companies.map(c=>`<div class="week-card"><b>${esc(c.name)}（${esc(c.stock_code)}）</b><p>${esc(c.evidence_gap)}</p><a href="${esc(c.source_url)}" target="_blank" rel="noopener">查看發現來源</a></div>`).join(''):'<div class="empty">尚無候選公司</div>';render()})();
</script></body></html>
