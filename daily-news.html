<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>每日新聞｜AI Infrastructure Bankability Intelligence</title><link rel="stylesheet" href="assets/news.css"></head><body>
<header class="bar"><div class="bar-inner"><div class="brand">AI INFRASTRUCTURE INTELLIGENCE</div><nav class="nav"><a href="index.html">研究平台</a><a class="active" href="daily-news.html">每日新聞</a><a href="review-dashboard.html">新聞審核</a><a href="weekly-intelligence.html">Weekly Intelligence</a></nav></div></header>
<main class="container"><section class="hero"><h1>AI Infrastructure 每日新聞</h1><p>僅發布已完成審核的公開資訊；新聞不會自動改變公司或子產業正式評分。</p><div class="metrics"><div class="metric"><b id="newsCount">0</b><span>已核准事件</span></div><div class="metric"><b id="companyCount">0</b><span>涵蓋公司</span></div><div class="metric"><b id="industryCount">0</b><span>涵蓋子產業</span></div><div class="metric"><b id="updatedAt">尚未更新</b><span>Asia/Taipei</span></div></div></section>
<section class="panel"><h2>新聞篩選</h2><div class="controls"><input id="q" type="search" placeholder="搜尋公司、事件、子產業或摘要…"><select id="system"><option value="">全部六大系統</option></select><select id="event"><option value="">全部事件類型</option></select><select id="grade"><option value="">全部 Evidence Grade</option><option>A</option><option>B</option><option>C</option></select><button id="csv">匯出可見新聞 CSV</button></div><div class="news-list" id="newsList"><div class="empty">載入中…</div></div></section></main><footer class="footer">Public information only｜所有新聞均保留原文連結、發布日期與 Evidence Gap。</footer>
<script src="assets/news.js"></script><script>
let all=[];const el=id=>document.getElementById(id);function options(id,values){el(id).insertAdjacentHTML('beforeend',[...new Set(values.filter(Boolean))].sort().map(v=>`<option>${esc(v)}</option>`).join(''))}
function visible(){const q=el('q').value.toLowerCase(),s=el('system').value,e=el('event').value,g=el('grade').value;return all.filter(x=>(!q||JSON.stringify(x).toLowerCase().includes(q))&&(!s||x.system===s)&&(!e||x.event_type===e)&&(!g||x.evidence_grade===g))}
function render(){const rows=visible();el('newsList').innerHTML=rows.length?rows.map(x=>`<article class="news-card ${x.importance==='High'?'high':''}"><div class="meta"><span>${fmt(x.published_at)}</span><span>｜${esc(x.source_name||'來源未標示')}</span><span>｜重要性 ${esc(x.importance||'N/A')}</span></div><h3><a href="${esc(x.url)}" target="_blank" rel="noopener">${esc(x.title)}</a></h3><div class="tags">${(x.companies||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join('')}${(x.subindustries||[]).map(v=>`<span class="tag">${esc(v)}</span>`).join('')}<span class="tag">${esc(x.event_type||'未分類')}</span><span class="tag grade-${String(x.evidence_grade||'C').toLowerCase()}">Evidence ${esc(x.evidence_grade||'C')}</span></div><p>${esc(x.summary||'')}</p><p><b>銀行意涵：</b>${esc(x.banking_implication||'待審核')}</p><div class="gap">⚠ Evidence Gap：${esc(x.evidence_gap||'須回查原始官方資料。')}</div></article>`).join(''):`<div class="empty">目前沒有符合條件的已核准新聞。</div>`}
['q','system','event','grade'].forEach(id=>el(id).addEventListener(id==='q'?'input':'change',render));el('csv').onclick=()=>downloadCSV('AI_Infrastructure_Daily_News.csv',[['日期','標題','公司','系統','子產業','事件','Evidence','來源','網址'],...visible().map(x=>[x.published_at,x.title,(x.companies||[]).join('／'),x.system,(x.subindustries||[]).join('／'),x.event_type,x.evidence_grade,x.source_name,x.url])]);
(async()=>{const d=await loadJSON('data/public/news.json',{items:[]});all=d.items||[];options('system',all.map(x=>x.system));options('event',all.map(x=>x.event_type));el('newsCount').textContent=all.length;el('companyCount').textContent=new Set(all.flatMap(x=>x.companies||[])).size;el('industryCount').textContent=new Set(all.flatMap(x=>x.subindustries||[])).size;el('updatedAt').textContent=d.generated_at?fmt(d.generated_at):'尚未更新';render()})();
</script></body></html>
